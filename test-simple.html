<!DOCTYPE html>
<html>
<head>
  <title>Test Simple</title>
</head>
<body>
  <h1>Test de carga de JSON</h1>
  <button onclick="testLoad('EST-2025-GC-8F3K')">Cargar EST-2025-GC-8F3K (Edificio Alessandri)</button>
  <button onclick="testLoad('EST-2026-VK-5R2N')">Cargar EST-2026-VK-5R2N (Proyecto Peñablanca)</button>
  <button onclick="testLoad('DEMO-2026-IG-5G2W')">Cargar DEMO-2026-IG-5G2W (Demo)</button>
  
  <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>
  
  <script>
    async function testLoad(codigo) {
      const result = document.getElementById('result');
      result.innerHTML = `<p>Cargando <strong>${codigo}.json</strong>...</p>`;
      
      try {
        const response = await fetch(`data/estudios/${codigo}.json`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        result.innerHTML = `
          <p style="color: green;">✅ <strong>${codigo}.json</strong> cargado exitosamente</p>
          <p><strong>Código:</strong> ${data.meta?.codigo || 'N/A'}</p>
          <p><strong>Proyecto:</strong> ${data.meta?.proyecto || 'N/A'}</p>
          <p><strong>Inmobiliaria:</strong> ${data.meta?.inmobiliaria || 'N/A'}</p>
          <p><strong>Dirección:</strong> ${data.meta?.direccion || 'N/A'}</p>
        `;
      } catch (error) {
        result.innerHTML = `
          <p style="color: red;">❌ Error al cargar <strong>${codigo}.json</strong></p>
          <p><strong>Error:</strong> ${error.message}</p>
          <p>Verifica que el archivo exista en <code>data/estudios/${codigo}.json</code></p>
        `;
      }
    }
  </script>
</body>
</html>
