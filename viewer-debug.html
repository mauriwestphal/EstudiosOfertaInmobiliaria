<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Debug Viewer</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Debug Viewer</h1>
  <div id="debug"></div>
  <pre id="json-output"></pre>
  
  <script>
    const debug = document.getElementById('debug');
    const jsonOutput = document.getElementById('json-output');
    
    // Log inicial
    debug.innerHTML += `<p>🔍 URL completa: ${window.location.href}</p>`;
    debug.innerHTML += `<p>🔍 Query string: ${window.location.search}</p>`;
    
    const params = new URLSearchParams(window.location.search);
    let codigo = params.get('codigo') || '';
    
    debug.innerHTML += `<p>🔍 Código obtenido: <strong>${codigo}</strong></p>`;
    
    if (!codigo) {
      debug.innerHTML += `<p style="color: red;">❌ No hay código en la URL</p>`;
      return;
    }
    
    // Limpiar cache busting si existe
    if (codigo.includes('&_=')) {
      const originalCodigo = codigo;
      codigo = codigo.split('&_=')[0];
      debug.innerHTML += `<p>🔍 Código después de limpiar cache busting: ${codigo} (original: ${originalCodigo})</p>`;
    }
    
    // Intentar cargar el JSON
    debug.innerHTML += `<p>🔍 Intentando cargar: <code>data/estudios/${codigo}.json</code></p>`;
    
    fetch(`data/estudios/${codigo}.json`)
      .then(r => {
        debug.innerHTML += `<p>🔍 Status: ${r.status} ${r.statusText}</p>`;
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        debug.innerHTML += `<p style="color: green;">✅ JSON cargado exitosamente</p>`;
        debug.innerHTML += `<p>🔍 Código en JSON: <strong>${data.meta?.codigo || 'no encontrado'}</strong></p>`;
        debug.innerHTML += `<p>🔍 Proyecto: <strong>${data.meta?.proyecto || 'no encontrado'}</strong></p>`;
        debug.innerHTML += `<p>🔍 Inmobiliaria: ${data.meta?.inmobiliaria || 'no encontrada'}</p>`;
        
        // Mostrar JSON completo
        jsonOutput.textContent = JSON.stringify(data, null, 2);
      })
      .catch(error => {
        debug.innerHTML += `<p style="color: red;">❌ Error al cargar JSON: ${error.message}</p>`;
        
        // Intentar cargar el archivo que SI muestra "Proyecto Peñablanca"
        debug.innerHTML += `<p>🔍 Intentando cargar EST-2026-VK-5R2N.json para comparar...</p>`;
        fetch('data/estudios/EST-2026-VK-5R2N.json')
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(data => {
            debug.innerHTML += `<p>🔍 EST-2026-VK-5R2N.json cargado: ${data.meta?.proyecto || 'no proyecto'}</p>`;
          })
          .catch(e => {
            debug.innerHTML += `<p>🔍 No se pudo cargar EST-2026-VK-5R2N.json: ${e.message}</p>`;
          });
      });
  </script>
</body>
</html>
