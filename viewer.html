<style id="chat-styles-insert">

/* ── Chat launcher button ─────────────────────────── */
#chat-launcher {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 9000;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--teal);
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(29,106,106,.45);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .2s, box-shadow .2s;
}
#chat-launcher:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 28px rgba(29,106,106,.55);
}
#chat-launcher svg { width: 52px; height: 52px; }

/* ── Anillo pulsante ───────────────────────────────── */
#chat-launcher::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: var(--teal);
  animation: chat-ping 2.2s ease-out infinite;
  z-index: -1;
}
@keyframes chat-ping {
  0%   { transform: scale(1);   opacity: .55; }
  70%  { transform: scale(1.7); opacity: 0;   }
  100% { transform: scale(1.7); opacity: 0;   }
}

/* ── Callout flotante ──────────────────────────────── */
#chat-callout {
  position: fixed;
  bottom: 90px;
  right: 16px;
  background: white;
  border: 1px solid var(--border-solid);
  border-radius: 12px;
  padding: 10px 14px;
  box-shadow: 0 4px 18px rgba(0,0,0,.13);
  font-size: .82rem;
  color: var(--text);
  max-width: 210px;
  line-height: 1.4;
  z-index: 8998;
  display: none;
  animation: callout-in .3s ease;
}
#chat-callout::after {
  content: '';
  position: absolute;
  bottom: -7px;
  right: 28px;
  width: 13px; height: 13px;
  background: white;
  border-right: 1px solid var(--border-solid);
  border-bottom: 1px solid var(--border-solid);
  transform: rotate(45deg);
}
#chat-callout-close {
  position: absolute;
  top: 5px; right: 8px;
  background: none; border: none;
  font-size: .9rem; cursor: pointer;
  color: var(--text-light);
  line-height: 1;
}
@keyframes callout-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0);   }
}

/* badge contador mensajes no leídos */
#chat-badge {
  position: absolute;
  top: -4px; right: -4px;
  background: var(--warm);
  color: white;
  font-size: .62rem;
  font-weight: 700;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  border: 2px solid white;
}

/* ── Chat panel ───────────────────────────────────── */
#chat-panel {
  position: fixed;
  bottom: 90px;
  right: 28px;
  z-index: 8999;
  width: 380px;
  max-height: 560px;
  background: var(--white);
  border: 1px solid var(--border-solid);
  border-radius: 16px;
  box-shadow: 0 12px 48px rgba(46,46,56,.18), 0 2px 8px rgba(46,46,56,.08);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform-origin: bottom right;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), opacity .18s ease;
}
#chat-panel.chat-hidden {
  transform: scale(.88) translateY(12px);
  opacity: 0;
  pointer-events: none;
}

/* header del panel */
.chat-header {
  background: var(--deep-ink);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.chat-header-icon {
  width: 32px; height: 32px;
  background: var(--teal);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.chat-header-icon svg { width: 16px; }
.chat-header-text { flex: 1; }
.chat-header-title {
  font-size: .83rem;
  font-weight: 700;
  color: var(--text-on-dark);
  line-height: 1.2;
}
.chat-header-sub {
  font-size: .68rem;
  color: rgba(247,249,249,.5);
}
.chat-close-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: rgba(247,249,249,.5);
  padding: 4px;
  border-radius: 4px;
  line-height: 0;
  transition: color .15s;
}
.chat-close-btn:hover { color: var(--text-on-dark); }

/* sugerencias rápidas */
.chat-suggestions {
  padding: 10px 12px 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border-solid);
}
.chat-suggestion-btn {
  padding: 4px 10px;
  border: 1.5px solid var(--border-solid);
  border-radius: 100px;
  background: var(--mist);
  font-family: 'Urbanist', sans-serif;
  font-size: .72rem;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
  text-align: left;
}
.chat-suggestion-btn:hover {
  border-color: var(--teal);
  color: var(--teal);
  background: var(--teal-light);
}

/* mensajes */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border-solid); border-radius: 4px; }

.chat-msg {
  display: flex;
  flex-direction: column;
  max-width: 88%;
  animation: chatMsgIn .2s ease both;
}
@keyframes chatMsgIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:none; }
}
.chat-msg.user { align-self: flex-end; align-items: flex-end; }
.chat-msg.assistant { align-self: flex-start; align-items: flex-start; }

.chat-bubble {
  padding: 9px 12px;
  border-radius: 12px;
  font-size: .82rem;
  line-height: 1.55;
  word-break: break-word;
}
.chat-msg.user .chat-bubble {
  background: var(--teal);
  color: white;
  border-bottom-right-radius: 4px;
}
.chat-msg.assistant .chat-bubble {
  background: var(--mist);
  border: 1px solid var(--border-solid);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
}
/* formato markdown básico en respuestas */
.chat-bubble strong { font-weight: 700; }
.chat-bubble em     { font-style: italic; }
.chat-bubble ul, .chat-bubble ol {
  margin: 6px 0 2px 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.chat-bubble li { font-size: .81rem; }
.chat-bubble p  { margin-bottom: 6px; }
.chat-bubble p:last-child { margin-bottom: 0; }

.chat-msg-time {
  font-size: .62rem;
  color: var(--text-muted);
  margin-top: 3px;
  padding: 0 4px;
}

/* typing indicator */
.chat-typing {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 10px 12px;
  background: var(--mist);
  border: 1px solid var(--border-solid);
  border-radius: 12px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}
.chat-typing span {
  width: 6px; height: 6px;
  background: var(--teal);
  border-radius: 50%;
  opacity: .4;
  animation: typingDot 1.2s infinite;
}
.chat-typing span:nth-child(2) { animation-delay: .2s; }
.chat-typing span:nth-child(3) { animation-delay: .4s; }
@keyframes typingDot {
  0%, 80%, 100% { opacity:.4; transform:scale(1); }
  40%           { opacity:1;  transform:scale(1.3); }
}

/* input area */
.chat-input-area {
  padding: 10px 12px;
  border-top: 1px solid var(--border-solid);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--white);
  flex-shrink: 0;
}
#chat-input {
  flex: 1;
  border: 1.5px solid var(--border-solid);
  border-radius: 10px;
  padding: 8px 12px;
  font-family: 'Urbanist', sans-serif;
  font-size: .82rem;
  color: var(--text-primary);
  background: var(--mist);
  resize: none;
  min-height: 38px;
  max-height: 100px;
  outline: none;
  transition: border-color .15s;
  line-height: 1.4;
}
#chat-input:focus { border-color: var(--teal); background: white; }
#chat-input::placeholder { color: var(--text-muted); }

#chat-send-btn {
  width: 36px; height: 36px;
  border-radius: 9px;
  background: var(--teal);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .15s, transform .1s;
}
#chat-send-btn:hover { background: var(--teal-mid); }
#chat-send-btn:active { transform: scale(.94); }
#chat-send-btn:disabled { background: var(--border-solid); cursor: not-allowed; }
#chat-send-btn svg { width: 16px; }

/* disclaimer footer */
.chat-disclaimer {
  padding: 6px 12px 8px;
  font-size: .64rem;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.4;
  border-top: 1px solid var(--border-solid);
  background: #fafbfb;
}

/* responsive */
@media (max-width: 480px) {
  #chat-panel { width: calc(100vw - 24px); left: 12px; right: 12px; bottom: 80px; }

  /* pill centrado en mobile */
  #chat-launcher {
    right: unset;
    bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    width: auto;
    border-radius: 28px;
    padding: 0 16px 0 20px;
    gap: 2px;
    white-space: nowrap;
  }
  #chat-launcher:hover { transform: translateX(-50%) scale(1.04); }
  #chat-launcher svg { display: none; }
  #chat-launcher::after {
    content: 'Consultar IA✦';
    color: white;
    font-size: .88rem;
    font-weight: 700;
    letter-spacing: .4px;
  }
  #chat-launcher::before { border-radius: 28px; }

  #chat-callout {
    right: 12px; left: 12px; max-width: unset;
    bottom: calc(76px + env(safe-area-inset-bottom, 0px));
  }
 
}
</style>
<style> 
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal:           #1D6A6A;
  --teal-mid:       #177A6C;
  --teal-light:     #E0F0EF;
  --teal-dark:      #155A5A;
  --warm:           #C49A3C;
  --warm-light:     #FBF4E3;
  --warm-dark:      #96741E;
  --deep-ink:       #2E2E38;
  --ink-mid:        #3A3A48;
  --mist:           #F7F9F9;
  --white:          #FFFFFF;
  --border:         rgba(29, 106, 106, 0.15);
  --border-solid:   #D8E8E7;
  --shadow-sm:      0 1px 3px rgba(46, 46, 56, 0.08);
  --shadow-md:      0 4px 12px rgba(46, 46, 56, 0.10);
  --text-primary:   #2E2E38;
  --text-secondary: #5A6B6B;
  --text-muted:     #6A7B7B;
  --text-on-dark:   #F7F9F9;
  --text-on-teal:   #FFFFFF;
  /* semantic colors for table badges — kept as-is */
  --green:    #374f2f;
  --green-l:  #E2EFDA;
  --blue-l:   #DEEAF1;
  --amber-l:  #FFF3CD;
  --salmon-l: #FCE4D6;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Urbanist', sans-serif;
  background: var(--mist);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
}

/* ══ HEADER ══════════════════════════════════════════════════════ */
.site-header {
  background: var(--deep-ink);
  border-bottom: 3px solid var(--teal);
  position: sticky; top: 0; z-index: 100;
}
.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.logo-wrap { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 32px; height: 32px;
  background: var(--teal);
  border-radius: 5px;
  display: grid; place-items: center;
}
.logo-mark svg { width: 18px; }
.brand-name {
  font-family: 'Urbanist', serif;
  font-size: 1rem;
  color: var(--text-on-dark);
}
.brand-dot { color: var(--teal-light); font-weight: 700; }

.header-meta { text-align: right; }
.header-meta .code {
  font-size: .7rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(247,249,249,.5);
}
.header-meta .proyecto-name {
  font-size: .9rem;
  font-weight: 600;
  color: var(--text-on-dark);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 280px;
}

/* ══ NAV TABS ════════════════════════════════════════════════════ */
.nav-tabs {
  background: var(--white);
  border-bottom: 1px solid var(--border-solid);
  position: sticky; top: 59px; z-index: 99;
}
.nav-tabs-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-tabs-inner::-webkit-scrollbar { display: none; }
.nav-tab {
  padding: 14px 20px;
  font-size: .82rem;
  font-weight: 500;
  color: var(--text-muted);
  border: none;
  background: none;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
  text-decoration: none;
  display: block;
}
.nav-tab:hover { color: var(--teal); }
.nav-tab.active { color: var(--teal); border-bottom-color: var(--teal); font-weight: 600; }

/* ══ LAYOUT ══════════════════════════════════════════════════════ */
.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 32px 64px;
}

/* ══ HERO META ═══════════════════════════════════════════════════ */
.hero {
  background: var(--deep-ink);
  border-radius: 14px;
  padding: 32px 36px;
  margin-bottom: 32px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(29,106,106,.12);
}
.hero-label {
  font-size: .7rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--teal-light);
  margin-bottom: 6px;
}
.hero h2 {
  font-family: 'Urbanist', serif;
  font-size: 1.6rem;
  color: var(--text-on-dark);
  margin-bottom: 4px;
}
.hero-sub { font-size: .85rem; color: rgba(247,249,249,.6); }
.hero-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.hero-pill {
  padding: 4px 12px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 100px;
  font-size: .78rem;
  color: rgba(247,249,249,.75);
}
.hero-code { text-align: center; }
.hero-code .lbl { font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(247,249,249,.4); }
.hero-code .val {
  font-size: .95rem;
  font-weight: 600;
  letter-spacing: .08em;
  color: var(--warm);
  background: rgba(196,154,60,.12);
  border: 1px solid rgba(196,154,60,.3);
  border-radius: 6px;
  padding: 6px 14px;
  margin-top: 4px;
  white-space: nowrap;
}

/* ══ SECTION BLOCK ═══════════════════════════════════════════════ */
.section { margin-bottom: 40px; scroll-margin-top: 120px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--teal);
}
.section-number {
  width: 28px; height: 28px;
  background: var(--teal);
  color: var(--text-on-teal);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: .75rem;
  font-weight: 700;
  flex-shrink: 0;
}
.section-title {
  font-family: 'Urbanist', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--deep-ink);
}
.section-badge {
  margin-left: auto;
  padding: 3px 10px;
  background: var(--warm-light);
  border: 1px solid rgba(196,154,60,.3);
  border-radius: 100px;
  font-size: .72rem;
  font-weight: 600;
  color: var(--warm-dark);
}

/* ══ KPI CARDS ═══════════════════════════════════════════════════ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.kpi-card {
  background: var(--white);
  border: 1px solid var(--border-solid);
  border-radius: 10px;
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
}
.kpi-label {
  font-size: .68rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.kpi-value {
  font-size: 1.45rem;
  font-weight: 700;
  color: var(--teal);
  line-height: 1.1;
}
.kpi-sub {
  font-size: .7rem;
  color: var(--text-muted);
  margin-top: 3px;
}

/* ══ PROYECTO EVALUADO ═══════════════════════════════════════════ */
.proyecto-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 4px;
}
.detail-card {
  background: var(--white);
  border: 1px solid var(--border-solid);
  border-radius: 10px;
  padding: 20px 24px;
  box-shadow: var(--shadow-sm);
}
.detail-card-title {
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-solid);
}
.amenity-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.amenity-chip {
  padding: 4px 12px;
  background: var(--warm-light);
  border: 1px solid rgba(196,154,60,.3);
  border-radius: 100px;
  font-size: .78rem;
  font-weight: 500;
  color: var(--warm-dark);
}
.mix-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(29,106,106,.05);
}
.mix-row:last-child { border-bottom: none; }
.mix-tipo { font-weight: 600; color: var(--deep-ink); width: 80px; font-size: .85rem; flex-shrink: 0; }
.mix-bar-wrap { flex: 1; height: 8px; background: rgba(29,106,106,.08); border-radius: 4px; overflow: hidden; }
.mix-bar { height: 100%; background: var(--teal); border-radius: 4px; }
.mix-qty { font-size: .8rem; color: var(--text-muted); width: 36px; text-align: right; flex-shrink: 0; }
.ubicacion-row { display: flex; gap: 6px; align-items: baseline; margin-bottom: 8px; }
.ubicacion-label { font-size: .72rem; color: var(--text-muted); width: 120px; flex-shrink: 0; }
.ubicacion-val { font-size: .85rem; font-weight: 500; color: var(--text-primary); }

/* ══ FILTERS (ZONA Y TIPO) ═══════════════════════════════════════ */
.zona-filters, .tipo-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.zona-btn, .tipo-btn {
  padding: 5px 14px;
  border: 1.5px solid var(--border-solid);
  border-radius: 100px;
  background: var(--white);
  font-family: 'Urbanist', sans-serif;
  font-size: .78rem;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
}
.zona-btn:hover, .tipo-btn:hover { border-color: var(--teal); color: var(--teal); }
.zona-btn.active, .tipo-btn.active { background: var(--teal); color: var(--text-on-teal); border-color: var(--teal); }

/* ══ TABLES ══════════════════════════════════════════════════════ */
.table-wrap {
  background: var(--white);
  border-radius: 10px;
  border: 1px solid var(--border-solid);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.table-scroll { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--deep-ink); }
th {
  padding: 11px 14px;
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: rgba(247,249,249,.85);
  text-align: left;
  white-space: nowrap;
  border-right: 1px solid rgba(255,255,255,.07);
}
th:last-child { border-right: none; }

td {
  padding: 10px 14px;
  font-size: .83rem;
  color: var(--text-primary);
  border-bottom: 1px solid rgba(29,106,106,.06);
  border-right: 1px solid rgba(29,106,106,.04);
  vertical-align: middle;
}
td:last-child { border-right: none; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(29,106,106,.025); }
tr.even td { background: rgba(29,106,106,.015); }
tr.even:hover td { background: rgba(29,106,106,.035); }
tr.hidden-row { display: none; }

.td-price { font-weight: 700; color: var(--green); background: var(--green-l) !important; }
.td-price-dcto { font-weight: 600; color: #3b5ea6; background: var(--blue-l) !important; }
.td-ufm2 { font-weight: 600; color: var(--teal); }
.td-medio { font-weight: 700; color: var(--green); }

.tipo-1D1B td:first-child { border-left: 3px solid #4a90d9; }
.tipo-2D1B td:first-child { border-left: 3px solid #e6a817; }
.tipo-2D2B td:first-child { border-left: 3px solid #4caf50; }
.tipo-2D2BM td:first-child { border-left: 3px solid #e07b4f; }

.separator-row td {
  padding: 0; height: 3px;
  background: rgba(29,106,106,.08);
  border: none;
}

/* badge estado */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 100px;
  font-size: .72rem;
  font-weight: 600;
  white-space: nowrap;
}
.badge-green  { background: #d1fae5; color: #065f46; }
.badge-blue   { background: #dbeafe; color: #1e40af; }
.badge-amber  { background: #fef3c7; color: #92400e; }
.badge-purple { background: #ede9fe; color: #5b21b6; }
.badge-red    { background: #fee2e2; color: #991b1b; }

/* delta pills */
.delta-pos { color: #166534; font-weight: 700; }
.delta-neg { color: #991b1b; font-weight: 700; }

/* orientacion chips */
.chip-NO { background: #DBEAFE; color: #1e40af; }
.chip-N  { background: #D1FAE5; color: #065f46; }
.chip-P  { background: #EDE9FE; color: #5b21b6; }
.chip-SP { background: #FEF3C7; color: #92400e; }
.chip-S  { background: #FCE7F3; color: #9d174d; }
.orient-chip {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 100px;
  font-size: .72rem;
  font-weight: 600;
  margin: 1px;
}

/* ══ CHARTS GRID ══════════════════════════════════════════════════ */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}
.chart-card {
  background: var(--white);
  border: 1px solid var(--border-solid);
  border-radius: 10px;
  padding: 20px 24px;
  box-shadow: var(--shadow-sm);
}
.chart-title {
  font-size: .8rem;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--deep-ink);
  margin-bottom: 16px;
}
.chart-wrap { position: relative; height: 260px; }
canvas { max-height: 260px; }
.chart-full { grid-column: 1 / -1; }

/* ══ CHART FILTER ═════════════════════════════════════════════════ */
.chart-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.chart-filter-btn {
  padding: 5px 14px;
  border-radius: 100px;
  border: 1.5px solid var(--border-solid);
  background: var(--white);
  font-size: .78rem;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.chart-filter-btn:hover { border-color: var(--teal); color: var(--teal); }
.chart-filter-btn.active { background: var(--teal); border-color: var(--teal); color: #fff; }
.chart-xfilter {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: var(--teal-light);
  border: 1px solid var(--border-solid);
  border-radius: 8px;
  margin-bottom: 14px;
  font-size: .8rem;
  color: var(--teal-dark);
}
.chart-xfilter-label { flex: 1; font-weight: 500; }
.chart-xfilter-clear {
  padding: 2px 10px;
  border-radius: 100px;
  border: 1.5px solid var(--teal);
  background: transparent;
  color: var(--teal);
  cursor: pointer;
  font-size: .78rem;
  font-family: inherit;
  transition: all .15s;
}
.chart-xfilter-clear:hover { background: var(--teal); color: #fff; }
.chart-wrap canvas { cursor: pointer; }

/* ══ MAP ══════════════════════════════════════════════════════════ */
.map-card {
  background: var(--white);
  border: 1px solid var(--border-solid);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.map-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border-solid);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.map-title {
  font-size: .8rem;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--deep-ink);
}
#mapa { height: 380px; }

/* ══ RESUMEN DE MERCADO ══════════════════════════════════════════ */
.resumen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 4px; }
.resumen-tipologias { background: var(--white); border: 1px solid var(--border-solid); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-sm); }
.resumen-zona { background: var(--white); border: 1px solid var(--border-solid); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-sm); }
.pos-card {
  background: var(--white);
  border: 1px solid var(--border-solid);
  border-radius: 10px;
  padding: 20px 24px;
  margin-top: 16px;
  box-shadow: var(--shadow-sm);
}
.pos-card-title {
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-solid);
}
.pos-uf-highlight {
  display: inline-block;
  font-size: 2rem;
  font-weight: 700;
  color: var(--teal);
  margin-bottom: 12px;
}
.pos-uf-sub { font-size: .8rem; color: var(--text-muted); margin-bottom: 16px; }
.pos-comparisons {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
}
.pos-comp-item {
  background: var(--mist);
  border-radius: 8px;
  padding: 12px 14px;
  border: 1px solid var(--border-solid);
}
.pos-comp-label { font-size: .7rem; color: var(--text-muted); margin-bottom: 4px; }
.pos-comp-value { font-size: 1.1rem; font-weight: 700; color: var(--teal); }
.pos-comp-value.neg { color: #991b1b; }
.pos-directos { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border-solid); }
.pos-directos-label { font-size: .72rem; color: var(--text-muted); margin-bottom: 6px; }
.pos-directos-val { font-size: .83rem; color: var(--text-primary); margin-bottom: 3px; }

/* ══ NOTAS ════════════════════════════════════════════════════════ */
.notas-grid { display: grid; gap: 10px; }
.nota-item {
  background: var(--white);
  border: 1px solid var(--border-solid);
  border-radius: 8px;
  padding: 14px 18px;
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 16px;
  align-items: start;
}
.nota-titulo { font-size: .8rem; font-weight: 600; color: var(--deep-ink); }
.nota-texto { font-size: .83rem; color: #4b5563; line-height: 1.6; }

/* ══ FOOTER ══════════════════════════════════════════════════════ */
.page-footer {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border-solid);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: .75rem;
  color: var(--text-muted);
}
.back-link {
  color: var(--teal);
  text-decoration: none;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .82rem;
}
.back-link:hover { color: var(--teal-mid); text-decoration: underline; }

/* ══ RESPONSIVE ══════════════════════════════════════════════════ */
@media (max-width: 900px) {
  .charts-grid { grid-template-columns: 1fr; }
  .hero { grid-template-columns: 1fr; }
  .hero-code { text-align: left; }
  .page { padding: 20px 16px 48px; }
  .nota-item { grid-template-columns: 1fr; gap: 4px; }
  .proyecto-details { grid-template-columns: 1fr; }
  .resumen-grid { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .header-inner { padding: 12px 16px; }
  .nav-tabs-inner { padding: 0 16px; }
  .hero { padding: 24px 20px; }
}

/* fade-in */
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
.section { animation: fadeUp .4s ease both; }
.section:nth-child(2) { animation-delay: .05s; }
.section:nth-child(3) { animation-delay: .10s; }
.section:nth-child(4) { animation-delay: .15s; }
.section:nth-child(5) { animation-delay: .20s; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo-wrap" style="text-decoration:none;">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none">
          <rect x="2" y="10" width="4" height="8" fill="white" rx="1"/>
          <rect x="8" y="6"  width="4" height="12" fill="white" rx="1"/>
          <rect x="14" y="2" width="4" height="16" fill="white" rx="1"/>
        </svg>
      </div>
      <div class="brand-name">RW Consulting<span class="brand-dot">.</span></div>
    </a>
    <div class="header-meta">
      <div class="code" id="hdr-code">Cargando…</div>
      <div class="proyecto-name" id="hdr-proyecto">—</div>
    </div>
  </div>
</header>

<!-- NAV TABS (filled by JS) -->
<nav class="nav-tabs">
  <div class="nav-tabs-inner" id="nav-tabs-inner"></div>
</nav>

<!-- PAGE -->
<div class="page">

  <!-- HERO -->
  <div class="hero" id="hero">
    <div>
      <div class="hero-label">Estudio de Mercado · Proyectos Nuevos</div>
      <h2 id="hero-proyecto">—</h2>
      <div class="hero-sub" id="hero-dir">—</div>
      <div class="hero-pills" id="hero-pills"></div>
    </div>
    <div class="hero-code">
      <div class="lbl">Código de estudio</div>
      <div class="val" id="hero-code">—</div>
    </div>
  </div>

  <!-- DYNAMIC SECTIONS -->
  <div id="sections-container"></div>

  <!-- FOOTER -->
  <div class="page-footer">
    <a class="back-link" href="index.html">← Volver al inicio</a>
    <div id="footer-meta">—</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ── Helpers ────────────────────────────────────────────────────────
const fmt   = n => (n != null) ? n.toLocaleString('es-CL', {minimumFractionDigits:0, maximumFractionDigits:1}) : '—';
const fmtUF = n => (n != null) ? n.toLocaleString('es-CL', {minimumFractionDigits:0, maximumFractionDigits:0}) : '—';

function estadoBadge(e) {
  const map = {
    'Entrega inmediata': 'badge-green',
    'Pronta entrega':    'badge-blue',
    'Venta en verde':    'badge-amber',
    'Venta en blanco':   'badge-purple',
    'Últimas unidades':  'badge-red',
  };
  return `<span class="badge ${map[e]||'badge-blue'}">${e||'—'}</span>`;
}

function orientChip(o) {
  if (!o) return '—';
  return o.split('/').map(s => {
    const k = s.trim();
    return `<span class="orient-chip chip-${k}">${k}</span>`;
  }).join('');
}

function tipoBg(dist) {
  if (!dist) return '#F7F9F9';
  if (dist.includes('2D2B M') || dist === '2D2B M') return '#FCE4D6';
  if (dist.includes('2D2B')) return '#E2EFDA';
  if (dist.includes('2D1B')) return '#FFF3CD';
  return '#DEEAF1';
}
function tipoClass(dist) {
  if (!dist) return '';
  if (dist.includes('2D2B M')) return 'tipo-2D2BM';
  if (dist.includes('2D2B'))   return 'tipo-2D2B';
  if (dist.includes('2D1B'))   return 'tipo-2D1B';
  return 'tipo-1D1B';
}

// ── Load data ────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
let codigo = params.get('codigo') || '';
console.log('🔍 Código de URL:', codigo);
// Ignorar parámetro _ usado para cache busting
if (codigo.includes('&_=')) {
  codigo = codigo.split('&_=')[0];
  console.log('🔍 Código después de limpiar cache busting:', codigo);
}

let DATA = null;
try { DATA = JSON.parse(sessionStorage.getItem('estudio')); } catch(e) {}
console.log('🔍 DATA de sessionStorage:', DATA ? 'presente' : 'ausente');

// Si no hay DATA pero hay codigo en sessionStorage, usarlo
if (!DATA && !codigo) {
  try { 
    const storedCodigo = sessionStorage.getItem('estudio_codigo');
    console.log('🔍 Código en sessionStorage:', storedCodigo);
    if (storedCodigo) codigo = storedCodigo;
  } catch(e) {}
}
console.log('🔍 Código final a usar:', codigo);

if (!DATA && codigo) {
  console.log('🔍 Fetching:', `data/estudios/${codigo}.json`);
  fetch(`data/estudios/${codigo}.json`)
    .then(r => {
      console.log('🔍 Fetch response status:', r.status, r.statusText);
      return r.ok ? r.json() : Promise.reject();
    })
    .then(data => {
      console.log('🔍 Data loaded successfully:', data.meta ? data.meta.codigo : 'no meta');
      console.log('🔍 Proyecto:', data.meta ? data.meta.proyecto : 'no proyecto');
      renderAll(data);
    })
    .catch((error) => {
      console.error('🔍 Fetch error:', error);
      document.body.innerHTML = '<div style="padding:60px;text-align:center;font-family:sans-serif"><h2>Código no válido o sesión expirada.</h2><br><a href="index.html">← Volver</a></div>';
    });
} else if (DATA) {
  renderAll(DATA);
} else {
  location.href = 'index.html';
}

// ── RENDER ALL ────────────────────────────────────────────────────
function renderAll(d) {
  DATA = d;
  const m = d.meta;

  document.title = `${m.proyecto} — Estudio de Mercado`;
  document.getElementById('hdr-code').textContent     = m.codigo;
  document.getElementById('hdr-proyecto').textContent = m.proyecto;

  renderHero(d);

  // Build sections array dynamically
  const sections = [];
  if (d.proyecto_evaluado)
    sections.push({key:'proyecto',     title:'Proyecto evaluado',                        render: () => renderProyecto(d)});
  if (d.competencia?.length)
    sections.push({key:'competencia',  title:'Competencia directa — Proyectos nuevos',   render: () => renderCompetencia(d)});
  if (d.precios_base?.length)
    sections.push({key:'precios',      title:'Precios base por tipología y orientación', render: () => renderPrecios(d)});
  if (d.competencia?.length)
    sections.push({key:'graficos',     title:'Análisis gráfico',                         render: () => renderGraficos(d)});
  if (d.competencia?.some(r => r.lat))
    sections.push({key:'mapa',         title:'Ubicación de competencia',                 render: () => renderMapa(d)});
  if (d.resumen_mercado)
    sections.push({key:'resumen',      title:'Resumen de mercado',                       render: () => renderResumen(d)});
  if (d.ponderacion_orientacion?.length)
    sections.push({key:'ponderacion',  title:'Escala de ponderación por orientación',    render: () => renderPonderacion(d)});
  if (d.notas?.length)
    sections.push({key:'notas',        title:'Notas metodológicas y fuentes',            render: () => renderNotas(d)});

  buildNavTabs(sections);
  buildSectionContainers(sections);
  sections.forEach(s => s.render());
  setupNavScroll(sections);

  const analista = m.analista || m.autor || '';
  document.getElementById('footer-meta').textContent = `${analista} · ${m.fecha} · Código: ${m.codigo}`;
}

// ── HERO ──────────────────────────────────────────────────────────
function renderHero(d) {
  const m = d.meta;
  document.getElementById('hero-proyecto').textContent = m.proyecto;
  document.getElementById('hero-dir').textContent      = m.direccion || '';
  document.getElementById('hero-code').textContent     = m.codigo;

  const pills = [];
  if (m.inmobiliaria) pills.push(m.inmobiliaria);
  else if (m.cliente) pills.push(`Cliente: ${m.cliente}`);
  if (m.unidades)     pills.push(`${m.unidades} unidades`);
  if (m.pisos)        pills.push(`Pisos ${m.pisos}`);
  if (m.fecha)        pills.push(m.fecha);
  if (m.analista)     pills.push(m.analista);
  //else if (m.autor)   pills.push(m.autor);

  document.getElementById('hero-pills').innerHTML = pills.map(p => `<span class="hero-pill">${p}</span>`).join('');
}

// ── NAV + SECTION BUILDERS ────────────────────────────────────────
function buildNavTabs(sections) {
  document.getElementById('nav-tabs-inner').innerHTML = sections.map((s, i) =>
    `<a class="nav-tab${i===0?' active':''}" href="#sec-${s.key}">${i+1}. ${s.title.split('—')[0].trim()}</a>`
  ).join('');
}

function buildSectionContainers(sections) {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  sections.forEach((s, i) => {
    const el = document.createElement('section');
    el.className = 'section';
    el.id = `sec-${s.key}`;
    el.innerHTML = `
      <div class="section-header">
        <div class="section-number">${i+1}</div>
        <div class="section-title">${s.title}</div>
        <div class="section-badge" id="badge-${s.key}" style="display:none"></div>
      </div>
      <div id="body-${s.key}"></div>`;
    container.appendChild(el);
  });
}

function setBadge(key, text) {
  const el = document.getElementById(`badge-${key}`);
  if (el) { el.textContent = text; el.style.display = ''; }
}

// ── S: PROYECTO EVALUADO ──────────────────────────────────────────
function renderProyecto(d) {
  const p = d.proyecto_evaluado;
  const body = document.getElementById('body-proyecto');

  // KPI Cards
  const kpis = [];
  if (p.total_unidades)         kpis.push({label:'Unidades totales',  val: p.total_unidades, sub:''});
  if (p.superficie_vendible_m2) kpis.push({label:'m² vendibles',      val: `${p.superficie_vendible_m2.toLocaleString('es-CL')} m²`, sub:''});
  if (p.superficie_promedio_m2) kpis.push({label:'m² promedio',       val: `${p.superficie_promedio_m2} m²`, sub:''});
  if (p.precio_promedio_uf)     kpis.push({label:'Precio promedio',    val: `UF ${fmtUF(p.precio_promedio_uf)}`, sub:'por unidad'});
  if (p.uf_m2_neto_depto)      kpis.push({label:'UF/m² neto depto',   val: fmt(p.uf_m2_neto_depto), sub:'sin est. ni bod.'});
  if (p.venta_neta_total_uf)    kpis.push({label:'Venta neta total',   val: `UF ${(p.venta_neta_total_uf/1000).toFixed(0)}k`, sub:'ingresos brutos'});

  let html = `<div class="kpi-grid">${kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.val}</div>
      ${k.sub ? `<div class="kpi-sub">${k.sub}</div>` : ''}
    </div>`).join('')}</div>`;

  // Details row
  html += '<div class="proyecto-details">';

  // Amenities
  if (p.amenities?.length) {
    html += `<div class="detail-card">
      <div class="detail-card-title">Amenities</div>
      <div class="amenity-chips">${p.amenities.map(a => `<span class="amenity-chip">${a}</span>`).join('')}</div>
    </div>`;
  }

  // Mix de unidades
  if (p.mix_unidades?.length) {
    const maxQty = Math.max(...p.mix_unidades.map(m => m.cantidad));
    html += `<div class="detail-card">
      <div class="detail-card-title">Mix de unidades</div>
      ${p.mix_unidades.map(m => `
        <div class="mix-row">
          <div class="mix-tipo">${m.tipo}</div>
          <div class="mix-bar-wrap"><div class="mix-bar" style="width:${Math.round(m.cantidad/maxQty*100)}%"></div></div>
          <div class="mix-qty">${m.cantidad}</div>
        </div>`).join('')}
    </div>`;
  }

  // Ubicación
  const ubicRows = [];
  if (p.desarrollador)        ubicRows.push(['Desarrollador', p.desarrollador]);
  if (p.direccion)            ubicRows.push(['Dirección', p.direccion]);
  if (p.sector)               ubicRows.push(['Sector', p.sector]);
  if (p.distancia_centro_m)   ubicRows.push(['Dist. al centro', `${p.distancia_centro_m.toLocaleString('es-CL')} m`]);
  if (p.pisos)                ubicRows.push(['Pisos', p.pisos]);
  if (p.estacionamientos)     ubicRows.push(['Estacionamientos', p.estacionamientos]);
  if (p.bodegas)              ubicRows.push(['Bodegas', p.bodegas]);
  if (p.vende)                ubicRows.push(['Vende', p.vende]);
  if (ubicRows.length) {
    html += `<div class="detail-card">
      <div class="detail-card-title">Datos del proyecto</div>
      ${ubicRows.map(r => `<div class="ubicacion-row"><span class="ubicacion-label">${r[0]}</span><span class="ubicacion-val">${r[1]}</span></div>`).join('')}
    </div>`;
  }

  html += '</div>';
  body.innerHTML = html;
}

// ── S: COMPETENCIA ────────────────────────────────────────────────
function renderCompetencia(d) {
  const rows = d.competencia;
  const body = document.getElementById('body-competencia');
  setBadge('competencia', `${rows.length} tipologías`);

  // Determine visible columns
  const hasZona      = rows.some(r => r.zona        != null);
  const hasDisp      = rows.some(r => r.disponibles != null);
  const hasPrecioDcto= rows.some(r => r.precio_dcto_uf != null);
  const hasUfDcto    = rows.some(r => r.uf_m2_dcto  != null);
  const hasVista     = rows.some(r => r.vista_principal != null);
  const hasOrient    = rows.some(r => r.orientacion  != null);
  const hasEstac     = rows.some(r => r.estacionamiento_uf != null);
  const hasBodega    = rows.some(r => r.bodega_uf    != null);
  const hasTipoProp  = rows.some(r => r.tipo_propiedad != null);

  // Tipo filter buttons (casas vs departamentos)
  let tipoFilterHtml = '';
  let tipos = [];
  if (hasTipoProp) {
    tipos = [...new Set(rows.map(r => r.tipo_propiedad).filter(Boolean))].sort();
    const casaCount = rows.filter(r => r.tipo_propiedad === 'casa').length;
    const deptoCount = rows.filter(r => r.tipo_propiedad === 'departamento').length;
    
    tipoFilterHtml = `<div class="tipo-filters" style="margin-bottom: 12px;">
      <button class="tipo-btn active" onclick="filtrarTipo('todos',this)">Todos (${rows.length})</button>
      <button class="tipo-btn" onclick="filtrarTipo('casa',this)">🏠 Casas (${casaCount})</button>
      <button class="tipo-btn" onclick="filtrarTipo('departamento',this)">🏢 Departamentos (${deptoCount})</button>
    </div>`;
  }

  // Zona filter buttons
  let zonaFilterHtml = '';
  let zonas = [];
  if (hasZona) {
    zonas = [...new Set(rows.map(r => r.zona).filter(Boolean))].sort();
    zonaFilterHtml = `<div class="zona-filters">
      <button class="zona-btn active" onclick="filtrarZona('todos',this)">Todos (${rows.length})</button>
      ${zonas.map(z => {
        const count = rows.filter(r => r.zona === z).length;
        return `<button class="zona-btn" onclick="filtrarZona('${z}',this)">${capitalize(z)} (${count})</button>`;
      }).join('')}
    </div>`;
  }

  // Table header
  const headers = ['Proyecto / Tipología','Tipo','Dirección','Inmobiliaria','Estado','Pisos','D/B','m² útil','Terraza'];
  if (hasOrient)    headers.push('Orientación');
  if (hasZona)      headers.push('Zona');
  if (hasVista)     headers.push('Vista');
  if (hasDisp)      headers.push('Disponibles');
  headers.push('Precio lista');
  // if (hasPrecioDcto) headers.push('Precio dcto');
  headers.push('UF/m² lista');
  // if (hasUfDcto)    headers.push('UF/m² dcto');
  if (hasEstac)     headers.push('Est. UF');
  if (hasBodega)    headers.push('Bod. UF');
  headers.push('Fuente');

  const headHtml = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;

  // Table rows
  const bodyHtml = rows.map((r, i) => {
    const tipoIcon = r.tipo_propiedad === 'casa' ? '🏠' : r.tipo_propiedad === 'departamento' ? '🏢' : '';
    const tipoText = r.tipo_propiedad === 'casa' ? 'Casa' : r.tipo_propiedad === 'departamento' ? 'Depto' : '—';
    
    const cells = [
      `<td><strong>${r.proyecto}</strong></td>`,
      `<td style="text-align:center;font-size:.9rem" title="${tipoText}">${tipoIcon}</td>`,
      `<td style="color:var(--text-muted);font-size:.78rem">${r.direccion||'—'}</td>`,
      `<td>${r.inmobiliaria||'—'}</td>`,
      `<td>${estadoBadge(r.estado)}</td>`,
      `<td style="text-align:center">${r.pisos != null ? r.pisos : '—'}</td>`,
      `<td style="text-align:center;font-weight:600">${(r.dorms||'')+(r.banos||'')}</td>`,
      `<td style="text-align:center">${fmt(r.m2_util)}</td>`,
      `<td style="text-align:center">${fmt(r.terraza)}</td>`,
    ];
    if (hasOrient) cells.push(`<td>${r.orientacion ? orientChip(r.orientacion) : '—'}</td>`);
    if (hasZona)   cells.push(`<td>${r.zona ? capitalize(r.zona) : '—'}</td>`);
    if (hasVista)  cells.push(`<td style="font-size:.78rem">${r.vista_principal||'—'}</td>`);
    if (hasDisp)   cells.push(`<td style="text-align:center">${r.disponibles != null ? r.disponibles : '—'}</td>`);
    cells.push(`<td class="td-price">${fmtUF(r.precio_lista_uf)}</td>`);
    // if (hasPrecioDcto) cells.push(`<td class="td-price-dcto">${r.precio_dcto_uf != null ? fmtUF(r.precio_dcto_uf) : '—'}</td>`);
    cells.push(`<td class="td-ufm2">${fmt(r.uf_m2_lista)}</td>`);
    // if (hasUfDcto) cells.push(`<td class="td-ufm2" style="color:#3b5ea6">${r.uf_m2_dcto != null ? fmt(r.uf_m2_dcto) : '—'}</td>`);
    if (hasEstac)  cells.push(`<td style="text-align:center;font-size:.8rem">${r.estacionamiento_uf != null ? fmtUF(r.estacionamiento_uf) : '—'}</td>`);
    if (hasBodega) cells.push(`<td style="text-align:center;font-size:.8rem">${r.bodega_uf != null ? fmtUF(r.bodega_uf) : '—'}</td>`);
    cells.push(`<td style="font-size:.75rem;color:var(--text-muted)">${r.fuente||'—'}</td>`);

    return `<tr class="${i%2===1?'even':''}" data-zona="${r.zona||''}" data-tipo="${r.tipo_propiedad||''}">${cells.join('')}</tr>`;
  }).join('');

  body.innerHTML = `
    ${tipoFilterHtml}
    ${zonaFilterHtml}
    <div class="table-wrap">
      <div class="table-scroll">
        <table id="tabla-competencia">
          <thead>${headHtml}</thead>
          <tbody>${bodyHtml}</tbody>
        </table>
      </div>
    </div>`;
}

function filtrarTipo(tipo, btn) {
  document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#tabla-competencia tbody tr').forEach(tr => {
    if (tipo === 'todos' || tr.dataset.tipo === tipo) {
      tr.classList.remove('hidden-row');
    } else {
      tr.classList.add('hidden-row');
    }
  });
}

function filtrarZona(zona, btn) {
  document.querySelectorAll('.zona-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#tabla-competencia tbody tr').forEach(tr => {
    if (zona === 'todos' || tr.dataset.zona === zona) {
      tr.classList.remove('hidden-row');
    } else {
      tr.classList.add('hidden-row');
    }
  });
}

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1).replace(/_/g,' ') : s;
}

// ── S: GRÁFICOS ───────────────────────────────────────────────────
function renderGraficos(d) {
  const body = document.getElementById('body-graficos');
  const hasPrecios = d.precios_base?.length;
  const proyectos  = [...new Set(d.competencia.map(r => r.proyecto))];

  // ── Destaque proyecto evaluado ────────────────────────────────────
  // Activar con "destacar_proyecto_evaluado": true en el JSON
  const DESTACAR = d.meta?.destacar_proyecto_evaluado === true;
  const EM_NOMBRE = d.proyecto_evaluado?.nombre || null;
  // Colores destaque (warm gold del theme + teal)
  const EM_COLOR        = 'rgba(196,154,60,1)';      // --warm sólido
  const EM_COLOR_SOFT   = 'rgba(196,154,60,0.18)';   // fondo suave
  const EM_BORDER       = '#C49A3C';
  const EM_LABEL_SUFFIX = ' ★';

  // Gradient: value-based opacity 0.18→1.0; with highlight: selected=1.0, others=0.15
  // Si DESTACAR: el bar del proyecto evaluado lleva color EM_COLOR; el resto grad normal
  function grad(vals, r, g, b, hiIdx = null, labels = null) {
    const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
    return vals.map((v, i) => {
      // Destaque del proyecto evaluado por nombre de label
      if (DESTACAR && EM_NOMBRE && labels && labels[i] &&
          labels[i].toString().includes(EM_NOMBRE.substring(0, 8))) {
        return EM_COLOR;
      }
      if (hiIdx !== null) return i === hiIdx ? `rgba(${r},${g},${b},1)` : `rgba(${r},${g},${b},0.15)`;
      return `rgba(${r},${g},${b},${(0.18 + ((v - min) / range) * 0.82).toFixed(2)})`;
    });
  }

  // Construye datos de competencia aumentados con el proyecto evaluado (si DESTACAR)
  // Devuelve { comp: array aumentado, emIdx: índice donde está EM o null }
  function buildCompWithEM(rawComp) {
    if (!DESTACAR || !d.proyecto_evaluado) return { comp: rawComp, emIdx: null };
    const pe = d.proyecto_evaluado;

    // Calcular UF/m2 promedio del proyecto evaluado desde sus tipologías del mix
    // Si no tiene uf_m2_neto_depto, intentar calcularlo
    const emUFm2 = pe.uf_m2_neto_depto ?? null;
    if (!emUFm2) return { comp: rawComp, emIdx: null };

    // Calcular precio promedio y disponibles del proyecto evaluado
    const emPrecio = pe.precio_promedio_uf ?? null;

    // Crear filas sintéticas para el proyecto evaluado (una por tipología del mix)
    const emRows = (pe.mix_unidades || []).map(mix => {
      // UF/m2 por tipología: usar uf_m2_neto_depto como referencia global
      // (si el JSON tuviera precios por tipología se podrían usar)
      return {
        proyecto:       pe.nombre,
        zona:           pe.sector?.toLowerCase().replace(/ /g,'_') || 'proyecto_evaluado',
        dorms:          mix.tipo?.split('+')[0] || '',
        banos:          mix.tipo?.split('+')[1] || '',
        uf_m2_lista:    emUFm2,
        precio_lista_uf: emPrecio,
        disponibles:    null,   // no se incluye en stock de competencia
        _esEM:          true,
      };
    });

    const comp = [...rawComp, ...emRows];
    return { comp, emIdx: rawComp.length };  // primer índice EM
  }

  let activeFilter = null; // { dim: 'tipo'|'zona'|'proyecto', value }
  let currentComp  = d.competencia;
  let charts       = {};

  // Leyenda extra si DESTACAR
  const legendaEM = DESTACAR && EM_NOMBRE
    ? `<span style="display:inline-flex;align-items:center;gap:5px;font-size:.78rem;color:var(--warm-dark);background:var(--warm-light);border:1px solid rgba(196,154,60,.3);border-radius:100px;padding:3px 10px;margin-left:8px">
        <span style="width:10px;height:10px;border-radius:2px;background:var(--warm);flex-shrink:0"></span>
        ${EM_NOMBRE} (evaluado)
      </span>`
    : '';

  body.innerHTML = `
    <div class="chart-filter" style="align-items:center">
      <button class="chart-filter-btn active" data-proyecto="__all__">Todos</button>
      ${proyectos.map(p => `<button class="chart-filter-btn" data-proyecto="${p.replace(/"/g,'&quot;')}">${p}</button>`).join('')}
      ${legendaEM}
    </div>
    <div class="chart-xfilter" id="chart-xfilter" style="display:none">
      <span class="chart-xfilter-label" id="chart-xfilter-label"></span>
      <button class="chart-xfilter-clear" id="chart-xfilter-clear">Limpiar ×</button>
    </div>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">UF/m² por proyecto</div><div class="chart-wrap" id="wrap-chart-4"><canvas id="chart-4"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">${hasPrecios ? 'Precio lista por tipología + orientación' : 'Precio lista promedio por distribución'}</div><div class="chart-wrap"><canvas id="chart-1"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">UF/m² por zona</div><div class="chart-wrap"><canvas id="chart-2"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Stock disponible por zona</div><div class="chart-wrap"><canvas id="chart-3"></canvas></div></div>
    </div>`;

  function applyFilter(comp) {
    if (!activeFilter) return comp;
    return comp.filter(r => {
      if (activeFilter.dim === 'zona')     return r.zona === activeFilter.value;
      if (activeFilter.dim === 'proyecto') return r.proyecto === activeFilter.value;
      if (activeFilter.dim === 'tipo')     return `${r.dorms||''} ${r.banos||''}`.trim() === activeFilter.value;
      return true;
    });
  }

  function updateIndicator() {
    const el  = document.getElementById('chart-xfilter');
    const lbl = document.getElementById('chart-xfilter-label');
    if (activeFilter) {
      const dimLabel = { tipo:'Tipología', zona:'Zona', proyecto:'Proyecto' }[activeFilter.dim];
      lbl.textContent = `${dimLabel}: ${activeFilter.value}`;
      el.style.display = 'flex';
    } else {
      el.style.display = 'none';
    }
  }

  function setFilter(dim, value) {
    activeFilter = (activeFilter && activeFilter.dim === dim && activeFilter.value === value)
      ? null : { dim, value };
    updateIndicator();
    buildCharts(currentComp);
  }

  // Helpers destaque EM ─────────────────────────────────────────────
  // Devuelve true si el label pertenece al proyecto evaluado
  function isEM(label) {
    if (!DESTACAR || !EM_NOMBRE) return false;
    return label && label.toString().replace(' ★','') === EM_NOMBRE;
  }

  // Colores por array de labels: EM recibe dorado, resto grad normal
  function colorsByLabel(labels, vals, r, g, b, hiIdx = null) {
    const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
    return labels.map((lbl, i) => {
      if (isEM(lbl)) return EM_COLOR;
      if (hiIdx !== null) return i === hiIdx ? `rgba(${r},${g},${b},1)` : `rgba(${r},${g},${b},0.15)`;
      return `rgba(${r},${g},${b},${(0.18 + ((vals[i] - min) / range) * 0.82).toFixed(2)})`;
    });
  }

  // Etiqueta con estrella si es EM
  function emLabel(name) {
    if (DESTACAR && EM_NOMBRE && name === EM_NOMBRE) return name + EM_LABEL_SUFFIX;
    return name;
  }

  // tick color callback: dorado si es EM
  function tickColor(labels) {
    return function(ctx) {
      const lbl = labels[ctx.index] || '';
      return isEM(lbl) ? EM_BORDER : '#555';
    };
  }

  // Opciones comunes tooltip
  const ttDefaults = {
    backgroundColor: '#2E2E38',
    titleColor: '#F7F9F9',
    bodyColor: '#D0D8D8',
    cornerRadius: 6,
    padding: 8,
  };

  function buildCharts(comp) {
    Object.values(charts).forEach(c => c.destroy());
    charts = {};

    // ── Aumentar comp con proyecto evaluado si DESTACAR ───────────
    const { comp: compAug } = buildCompWithEM(comp);
    const compFull = compAug; // versión aumentada para charts 1,2,4

    const src = activeFilter?.dim;
    const fc  = applyFilter(comp);          // filtrado solo sobre competencia real
    const fcAug = applyFilter(compAug);     // filtrado sobre comp aumentada

    // ── Chart 1: Precio lista por distribución ────────────────────
    if (hasPrecios) {
      const vals1 = d.precios_base.map(r => r.precio_medio);
      charts.c1 = new Chart(document.getElementById('chart-1'), {
        type: 'bar',
        data: {
          labels: d.precios_base.map(r => r.codigo),
          datasets: [{ label:'Precio lista (UF)', data:vals1,
            backgroundColor: grad(vals1,29,106,106), borderRadius:4, borderSkipped:false }]
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false}, tooltip:{ ...ttDefaults, callbacks:{label:ctx=>`UF ${fmtUF(ctx.raw)}`}} },
          scales:{ x:{ticks:{font:{size:9},maxRotation:45,color:'#555'},grid:{display:false}},
                   y:{ticks:{font:{size:9},callback:v=>`UF ${fmtUF(v)}`,color:'#555'},grid:{color:'rgba(0,0,0,.05)'}} }
        }
      });
    } else {
      // Usa comp aumentada: EM aparece como tipología extra
      const c1src   = (src && src !== 'tipo') ? fcAug : compFull;
      const distMap = {};
      c1src.forEach(r => {
        const key = `${r.dorms||''} ${r.banos||''}`.trim();
        if (!distMap[key]) distMap[key] = [];
        if (r.precio_lista_uf != null) distMap[key].push(r.precio_lista_uf);
      });
      const labels1 = Object.keys(distMap).filter(k => distMap[k].length);
      const vals1   = labels1.map(k => Math.round(distMap[k].reduce((a,b)=>a+b,0)/distMap[k].length));
      const hiIdx1  = src === 'tipo' ? labels1.indexOf(activeFilter.value) : null;

      // Colores: si DESTACAR, barras donde UF promedio pertenece al EM se doran
      // (identificación por tipología no es unívoca, usamos grad normal + plugin afterDraw)
      const bgColors1 = grad(vals1,29,106,106,hiIdx1);
      charts.c1 = new Chart(document.getElementById('chart-1'), {
        type: 'bar',
        data: { labels: labels1, datasets: [{ label:'Precio lista (UF)', data:vals1,
          backgroundColor: bgColors1, borderRadius:4, borderSkipped:false }] },
        options: {
          responsive:true, maintainAspectRatio:false,
          onClick: (_, elems) => { if (elems.length) setFilter('tipo', labels1[elems[0].index]); },
          plugins:{ legend:{display:false}, tooltip:{ ...ttDefaults, callbacks:{label:ctx=>`UF ${fmtUF(ctx.raw)}`}} },
          scales:{ x:{ticks:{font:{size:9},color:'#555'},grid:{display:false}},
                   y:{ticks:{font:{size:9},callback:v=>`UF ${fmtUF(v)}`,color:'#555'},grid:{color:'rgba(0,0,0,.05)'}} }
        }
      });
    }

    // ── Chart 2: UF/m² por zona ───────────────────────────────────
    // Zona del proyecto evaluado: usa pe.sector o "proyecto_evaluado"
    const c2src     = (src && src !== 'zona') ? fcAug : compFull;
    const zonaUFMap = {};
    c2src.forEach(r => {
      const z = r.zona || 'sin zona';
      if (!zonaUFMap[z]) zonaUFMap[z] = [];
      if (r.uf_m2_lista != null) zonaUFMap[z].push(r.uf_m2_lista);
    });
    const zonaUFKeys = Object.keys(zonaUFMap);
    const vals2      = zonaUFKeys.map(k => zonaUFMap[k].length
      ? Math.round(zonaUFMap[k].reduce((a,b)=>a+b,0)/zonaUFMap[k].length*10)/10 : 0);
    const hiIdx2     = src === 'zona' ? zonaUFKeys.indexOf(activeFilter.value) : null;

    // Determinar si alguna zona es del EM (zona del proyecto_evaluado)
    const emZona = DESTACAR && d.proyecto_evaluado?.sector
      ? d.proyecto_evaluado.sector.toLowerCase().replace(/ /g,'_')
      : null;
    const bg2 = zonaUFKeys.map((k, i) => {
      if (DESTACAR && emZona && k === emZona) return EM_COLOR;
      if (hiIdx2 !== null) return i === hiIdx2 ? `rgba(196,154,60,1)` : `rgba(196,154,60,0.15)`;
      const range2 = Math.max(...vals2) - Math.min(...vals2) || 1;
      return `rgba(196,154,60,${(0.18 + ((vals2[i] - Math.min(...vals2)) / range2) * 0.82).toFixed(2)})`;
    });
    const labels2 = zonaUFKeys.map(k => {
      const lbl = capitalize(k);
      if (DESTACAR && emZona && k === emZona) return lbl + ' ★';
      return lbl;
    });
    charts.c2 = new Chart(document.getElementById('chart-2'), {
      type: 'bar',
      data: { labels: labels2, datasets: [{ label:'UF/m² promedio', data:vals2,
        backgroundColor: bg2, borderRadius:4, borderSkipped:false }] },
      options: {
        responsive:true, maintainAspectRatio:false,
        onClick: (_, elems) => { if (elems.length) setFilter('zona', zonaUFKeys[elems[0].index]); },
        plugins:{ legend:{display:false},
          tooltip:{ ...ttDefaults, callbacks:{label:ctx=>`${fmt(ctx.raw)} UF/m²`}} },
        scales:{
          x:{ ticks:{ font:{size:9}, color: ctx => labels2[ctx.index]?.includes('★') ? EM_BORDER : '#555' },
              grid:{display:false} },
          y:{ ticks:{font:{size:9},callback:v=>`${fmt(v)}`,color:'#555'},grid:{color:'rgba(0,0,0,.05)'} }
        }
      }
    });

    // ── Chart 3: Stock disponible por zona — sin EM (no tiene disponibles propios) ──
    const c3data      = (src && src !== 'zona') ? fc : comp;
    const zonaDispMap = {};
    const seenProy    = new Set();
    c3data.forEach(r => {
      const z   = r.zona || 'sin zona';
      const key = r.proyecto + '|' + z;
      if (!zonaDispMap[z]) zonaDispMap[z] = 0;
      if (!seenProy.has(key)) {
        seenProy.add(key);
        if (r.disponibles != null) zonaDispMap[z] += r.disponibles;
      }
    });
    // Añadir zona del EM con disponibles del proyecto evaluado si DESTACAR
    if (DESTACAR && d.proyecto_evaluado && emZona) {
      // Calcular disponibles del proyecto evaluado: total - (promesados + reservados)
      // Si no se sabe, usar total_unidades como indicativo o null
      const pe = d.proyecto_evaluado;
      // Intentar derivar disponibles (puede no existir en el JSON)
      const emDisp = pe.disponibles_estimados ?? null;
      if (emDisp != null) {
        if (!zonaDispMap[emZona]) zonaDispMap[emZona] = 0;
        zonaDispMap[emZona] += emDisp;
      }
    }
    const zonaDispKeys = Object.keys(zonaDispMap);
    const vals3        = zonaDispKeys.map(k => zonaDispMap[k]);
    const hiIdx3       = src === 'zona' ? zonaDispKeys.indexOf(activeFilter.value) : null;
    const bg3 = zonaDispKeys.map((k, i) => {
      if (DESTACAR && emZona && k === emZona) return EM_COLOR;
      if (hiIdx3 !== null) return i === hiIdx3 ? `rgba(74,144,217,1)` : `rgba(74,144,217,0.15)`;
      const range3 = Math.max(...vals3) - Math.min(...vals3) || 1;
      return `rgba(74,144,217,${(0.18 + ((vals3[i] - Math.min(...vals3)) / range3) * 0.82).toFixed(2)})`;
    });
    const labels3 = zonaDispKeys.map(k => {
      const lbl = capitalize(k);
      if (DESTACAR && emZona && k === emZona) return lbl + ' ★';
      return lbl;
    });
    charts.c3 = new Chart(document.getElementById('chart-3'), {
      type: 'bar',
      data: { labels: labels3, datasets: [{ label:'Disponibles', data:vals3,
        backgroundColor: bg3, borderRadius:4, borderSkipped:false }] },
      options: {
        responsive:true, maintainAspectRatio:false,
        onClick: (_, elems) => { if (elems.length) setFilter('zona', zonaDispKeys[elems[0].index]); },
        plugins:{ legend:{display:false},
          tooltip:{ ...ttDefaults, callbacks:{label:ctx=>`${ctx.raw} unidades`}} },
        scales:{
          x:{ ticks:{ font:{size:9}, color: ctx => labels3[ctx.index]?.includes('★') ? EM_BORDER : '#555' },
              grid:{display:false} },
          y:{ ticks:{font:{size:9},color:'#555'},grid:{color:'rgba(0,0,0,.05)'} }
        }
      }
    });

    // ── Chart 4: UF/m² por proyecto — horizontal ─────────────────
    // Incluye el proyecto evaluado como barra dorada
    const c4src     = (src && src !== 'proyecto') ? fcAug : compFull;
    const proyUFMap = {};
    c4src.forEach(r => {
      if (!proyUFMap[r.proyecto]) proyUFMap[r.proyecto] = [];
      if (r.uf_m2_lista != null) proyUFMap[r.proyecto].push(r.uf_m2_lista);
    });
    const proyKeys  = Object.keys(proyUFMap);
    const vals4     = proyKeys.map(k => Math.round(proyUFMap[k].reduce((a,b)=>a+b,0)/proyUFMap[k].length*10)/10);

    // Ordenar por valor ascendente
    const sorted4   = proyKeys.map((k,i) => ({k, v:vals4[i]})).sort((a,b)=>a.v-b.v);
    const sKeys4    = sorted4.map(x=>x.k);
    const sVals4    = sorted4.map(x=>x.v);
    const labels4   = sKeys4.map(k => {
      const lbl = emLabel(k.length > 26 ? k.substring(0,24)+'…' : k);
      return lbl;
    });
    const hiIdx4    = src === 'proyecto' ? sKeys4.indexOf(activeFilter.value) : null;
    const bg4       = colorsByLabel(labels4, sVals4, 46, 46, 56, hiIdx4);
    const bw4       = labels4.map(l => isEM(l) ? 2 : 0);

    document.getElementById('wrap-chart-4').innerHTML = '<canvas id="chart-4"></canvas>';
    charts.c4 = new Chart(document.getElementById('chart-4'), {
      type: 'bar',
      data: { labels: labels4, datasets: [{
        label:'UF/m²',
        data: sVals4,
        backgroundColor: bg4,
        borderColor:     labels4.map(l => isEM(l) ? EM_BORDER : 'transparent'),
        borderWidth:     bw4,
        borderRadius: 4,
        borderSkipped: false
      }]},
      options: {
        responsive:true, maintainAspectRatio:false,
        indexAxis: 'y',
        onClick: (_, elems) => { if (elems.length) setFilter('proyecto', sKeys4[elems[0].index]); },
        plugins:{
          legend:{display:false},
          tooltip:{ ...ttDefaults, callbacks:{label:ctx=>`${fmt(ctx.raw)} UF/m²`}}
        },
        scales:{
          x:{ ticks:{font:{size:9},color:'#555'},grid:{color:'rgba(0,0,0,.05)'} },
          y:{ ticks:{
                font: ctx => ({ size:9, weight: isEM(labels4[ctx.index]) ? '700' : '400' }),
                color: ctx => isEM(labels4[ctx.index]) ? EM_BORDER : '#555'
              },
              grid:{display:false}
          }
        }
      }
    });
  }

  buildCharts(currentComp);

  body.addEventListener('click', e => {
    if (e.target.id === 'chart-xfilter-clear') { activeFilter = null; updateIndicator(); buildCharts(currentComp); }
  });

  body.querySelectorAll('.chart-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      body.querySelectorAll('.chart-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = null;
      updateIndicator();
      const proy = btn.dataset.proyecto;
      currentComp = proy === '__all__' ? d.competencia : d.competencia.filter(r => r.proyecto === proy);
      buildCharts(currentComp);
    });
  });
}

// ── S: MAPA ───────────────────────────────────────────────────────
function renderMapa(d) {
  const body = document.getElementById('body-mapa');
  body.innerHTML = `<div class="map-card">
    <div class="map-header">
      <div class="map-title">Radio de mercado relevante</div>
      <div style="font-size:.78rem;color:var(--text-muted)">
        <span style="display:inline-block;width:10px;height:10px;background:#2E2E38;border-radius:50%;margin-right:4px;vertical-align:middle"></span>Proyecto evaluado &nbsp;
        <span style="display:inline-block;width:10px;height:10px;background:#C49A3C;border-radius:50%;margin-right:4px;vertical-align:middle"></span>Competencia
      </div>
    </div>
    <div id="mapa" style="height:380px"></div>
  </div>`;

  const comp = d.competencia;
  const allCoords = comp.filter(r => r.lat && r.lng);
  if (!allCoords.length) return;

  const lats = allCoords.map(r => r.lat);
  const lngs = allCoords.map(r => r.lng);
  const centerLat = lats.reduce((a,b)=>a+b,0)/lats.length;
  const centerLng = lngs.reduce((a,b)=>a+b,0)/lngs.length;

  const map = L.map('mapa').setView([centerLat, centerLng], 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap, © CARTO', maxZoom: 19
  }).addTo(map);

  const mainIcon = L.divIcon({
    html: `<div style="width:18px;height:18px;background:#2E2E38;border:2.5px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.35)"></div>`,
    className: '', iconAnchor: [9,9]
  });
  const warmIcon = L.divIcon({
    html: `<div style="width:14px;height:14px;background:#C49A3C;border:2px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>`,
    className: '', iconAnchor: [7,7]
  });

  // Main marker: proyecto_evaluado if has lat/lng, else first comp coord
  let mainLat = null, mainLng = null, mainName = '', mainAddr = '';
  if (d.proyecto_evaluado?.lat && d.proyecto_evaluado?.lng) {
    mainLat  = d.proyecto_evaluado.lat;
    mainLng  = d.proyecto_evaluado.lng;
    mainName = d.proyecto_evaluado.nombre;
    mainAddr = d.proyecto_evaluado.direccion || '';
  } else if (allCoords.length) {
    mainLat  = allCoords[0].lat;
    mainLng  = allCoords[0].lng;
    mainName = d.meta.proyecto;
    mainAddr = d.meta.direccion || '';
  }
  if (mainLat) {
    L.marker([mainLat, mainLng], {icon: mainIcon})
     .bindPopup(`<strong style="color:#2E2E38">${mainName}</strong><br><small>${mainAddr}</small>`)
     .addTo(map);
  }

  // Competition markers (group by coord)
  const seen = new Set();
  comp.forEach(r => {
    if (!r.lat || !r.lng) return;
    const key = `${r.lat},${r.lng}`;
    const isMain = mainLat && key === `${mainLat},${mainLng}` && !d.proyecto_evaluado?.lat;
    if (isMain || seen.has(key)) return;
    seen.add(key);

    const grupo = comp.filter(x => x.lat===r.lat && x.lng===r.lng);
    const popup = grupo.map(x => {
      const disp = x.disponibles != null ? `· ${x.disponibles} disp.` : '';
      return `<div style="padding:4px 0;border-bottom:1px solid #eee">
        <strong>${x.proyecto}</strong><br>
        <small style="color:#666">${[x.dorms != null ? x.dorms : null, x.banos != null ? x.banos : null].filter(Boolean).join('/')} ${disp} · UF ${fmtUF(x.precio_lista_uf)}</small>
      </div>`;
    }).join('');
    L.marker([r.lat, r.lng], {icon: warmIcon})
     .bindPopup(`<div style="min-width:200px;font-size:13px">${popup}</div>`)
     .addTo(map);
  });

  if (allCoords.length > 1) {
    map.fitBounds(allCoords.map(r => [r.lat, r.lng]), {padding:[30,30]});
  }
}

// ── S: RESUMEN DE MERCADO ─────────────────────────────────────────
function renderResumen(d) {
  const rm = d.resumen_mercado;
  const body = document.getElementById('body-resumen');

  // KPI top row
  const kpis = [];
  if (rm.total_proyectos  != null) kpis.push({label:'Proyectos relevados',  val:rm.total_proyectos});
  if (rm.total_disponibles!= null) kpis.push({label:'Unidades disponibles', val:rm.total_disponibles});
  if (rm.rango_uf_m2_lista) kpis.push({label:'Rango UF/m² lista', val:`${rm.rango_uf_m2_lista.min}–${rm.rango_uf_m2_lista.max}`});
  if (rm.rango_uf_m2_dcto)  kpis.push({label:'Rango UF/m² dcto',  val:`${rm.rango_uf_m2_dcto.min}–${rm.rango_uf_m2_dcto.max}`});

  let html = `<div class="kpi-grid">${kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.val}</div>
    </div>`).join('')}</div>`;

  html += '<div class="resumen-grid">';

  // Tabla por tipología
  if (rm.promedio_por_tipologia_dcto) {
    const tipRows = Object.entries(rm.promedio_por_tipologia_dcto);
    html += `<div class="resumen-tipologias">
      <table>
        <thead><tr>
          <th>Tipología</th><th>UF/m² mín.</th><th>UF/m² máx.</th><th>Promedio dcto</th><th>N° proyectos</th>
        </tr></thead>
        <tbody>${tipRows.map(([tip, v], i) => `
          <tr class="${i%2?'even':''}">
            <td><strong>${tip}</strong></td>
            <td style="text-align:center;color:var(--text-muted)">${fmt(v.min)}</td>
            <td style="text-align:center;color:var(--text-muted)">${fmt(v.max)}</td>
            <td class="td-ufm2" style="text-align:center">${fmt(v.promedio)}</td>
            <td style="text-align:center">${v.n_proyectos}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  // Tabla por zona
  if (rm.por_zona) {
    const zonaRows = Object.entries(rm.por_zona);
    html += `<div class="resumen-zona">
      <table>
        <thead><tr>
          <th>Zona</th><th>Proyectos</th><th>Rango UF/m²</th><th>Disponibles</th>
        </tr></thead>
        <tbody>${zonaRows.map(([z, v], i) => `
          <tr class="${i%2?'even':''}">
            <td><strong>${capitalize(z)}</strong></td>
            <td style="text-align:center">${v.proyectos}</td>
            <td style="font-size:.82rem">${v.rango_uf_m2}</td>
            <td style="text-align:center">${v.disponibles}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  html += '</div>';

  // Posicionamiento
  // Posicionamiento — buscar la clave dinámica (*_posicionamiento)
  const posKey = Object.keys(rm).find(k => k.endsWith('_posicionamiento'));
  if (posKey) {
    const pos = rm[posKey];
    const comparisons = [];
    if (pos.vs_promedio_1D) comparisons.push({label:'vs. promedio 1D', val:pos.vs_promedio_1D});
    if (pos.vs_promedio_2D) comparisons.push({label:'vs. promedio 2D', val:pos.vs_promedio_2D});
    if (pos.vs_promedio_3D) comparisons.push({label:'vs. promedio 3D', val:pos.vs_promedio_3D});
    if (pos.vs_payllahue_1D) comparisons.push({label:'vs. Payllahue 1D', val:pos.vs_payllahue_1D});
    if (pos.vs_andino_1D)   comparisons.push({label:'vs. Pucón Andino 1D', val:pos.vs_andino_1D});

    html += `<div class="pos-card">
      <div class="pos-card-title">Posicionamiento del proyecto evaluado</div>
      <div class="pos-uf-highlight">${fmt(pos.uf_m2_propuesto)} <span style="font-size:1rem;font-weight:400;color:var(--text-muted)">UF/m² propuesto</span></div>
      <div class="pos-comparisons">
        ${comparisons.map(c => `
          <div class="pos-comp-item">
            <div class="pos-comp-label">${c.label}</div>
            <div class="pos-comp-value ${c.val.includes('-')?'neg':''}">${c.val}</div>
          </div>`).join('')}
      </div>
      ${pos.competidores_directos_zona?.length ? `
        <div class="pos-directos">
          <div class="pos-directos-label">Competidores directos en zona</div>
          ${pos.competidores_directos_zona.map(c => `<div class="pos-directos-val">· ${c}</div>`).join('')}
        </div>` : ''}
    </div>`;
  }

  body.innerHTML = html;
}

// ── S: PONDERACIÓN ────────────────────────────────────────────────
function renderPonderacion(d) {
  const rows = d.ponderacion_orientacion;
  const body = document.getElementById('body-ponderacion');
  body.innerHTML = `<div class="table-wrap"><div class="table-scroll">
    <table>
      <thead><tr>
        <th>Orientación</th><th>Código</th><th>Δ% vs medio</th><th>Justificación</th><th>Aplica a</th>

          <td class="${dPos?'delta-pos':'delta-neg'}" style="text-align:center;font-size:.95rem">${dStr}</td>

// ── NAV SCROLL ────────────────────────────────────────────────────
function setupNavScroll(sections) {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        document.querySelectorAll('.nav-tab').forEach(t => {
          t.classList.toggle('active', t.getAttribute('href') === `#${id}`);
        });
      }
    });
  }, { rootMargin: '-30% 0px -60% 0px' });

  sections.forEach(s => {
    const el = document.getElementById(`sec-${s.key}`);
    if (el) observer.observe(el);
  });
}

  const badge       = document.getElementById('chat-badge');
  const headerSub   = document.getElementById('chat-header-sub');
  const suggestions = document.querySelectorAll('.chat-suggestion-btn');

  // ── CONECTAR CON DATA del viewer ──────────────────────────────────
  // El viewer define DATA una vez que carga el JSON. Esperamos a que esté.
  function tryConnectData() {
    if (typeof DATA !== 'undefined' && DATA !== null) {
      estudioData = DATA;
      headerSub.textContent = DATA.meta?.proyecto || 'Estudio cargado';
    } else {
      setTimeout(tryConnectData, 300);
    }
  }
  tryConnectData();

  // ── TOGGLE PANEL ─────────────────────────────────────────────────
  function openChat() {
    chatOpen = true;
    panel.classList.remove('chat-hidden');
    launcher.setAttribute('aria-expanded', 'true');
    badge.style.display = 'none';
    badge.textContent   = '';
    // Mensaje de bienvenida solo la primera vez
    if (chatHistory.length === 0) showWelcome();
    setTimeout(() => inputEl.focus(), 120);
  }

  function closeChat() {
    chatOpen = false;
    panel.classList.add('chat-hidden');
    launcher.setAttribute('aria-expanded', 'false');
  }

  launcher.addEventListener('click', () => chatOpen ? closeChat() : openChat());
  closeBtn.addEventListener('click', closeChat);

  // ── CALLOUT una sola vez por sesión ──────────────────────────────
  const callout      = document.getElementById('chat-callout');
  const calloutClose = document.getElementById('chat-callout-close');

  function hideCallout() {
    callout.style.display = 'none';
    sessionStorage.setItem('chat-callout-seen', '1');
  }

  if (!sessionStorage.getItem('chat-callout-seen')) {
    setTimeout(() => {
      if (!chatOpen) callout.style.display = 'block';
    }, 4000);
  }

  calloutClose.addEventListener('click', e => { e.stopPropagation(); hideCallout(); });
  launcher.addEventListener('click', hideCallout);

  // cerrar con Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && chatOpen) closeChat();
  });

  // ── BIENVENIDA ───────────────────────────────────────────────────
  function showWelcome() {
    const nombre = estudioData?.meta?.proyecto || 'este estudio';
    appendMsg('assistant',
      `👋 Hola, soy el asesor estratégico IA de RW Consulting.\n\nPuedo ayudarte con análisis sobre **${nombre}**: posicionamiento de precios, estrategias competitivas, oportunidades de mercado y análisis por tipología.\n\n¿Eres **inversionista** evaluando este proyecto, o de la **inmobiliaria** buscando estrategia de precios?`
    );
  }

  // ── SUGERENCIAS ───────────────────────────────────────────────────
  suggestions.forEach(btn => {
    btn.addEventListener('click', () => {
      const q = btn.dataset.q;
      if (q && !isLoading) {
        inputEl.value = q;
        sendMessage();
      }
    });
  });

  // ── ENVIAR ───────────────────────────────────────────────────────
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  // auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    if (!estudioData) {
      appendMsg('assistant', '⏳ El estudio aún está cargando, espera un momento…');
      return;
    }

    // Mostrar msg del usuario
    appendMsg('user', text);
    chatHistory.push({ role: 'user', content: text });
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setLoading(true);

    // Typing indicator
    const typingId = showTyping();

    try {
      const res = await fetch(WORKER_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          codigo:      (new URLSearchParams(location.search)).get('codigo') || '',
          messages:    chatHistory,
          estudioJson: estudioData,
        }),
      });

      removeTyping(typingId);

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `Error ${res.status}`);
      }

      const data     = await res.json();
      const reply    = data.response || 'Sin respuesta.';

      chatHistory.push({ role: 'assistant', content: reply });
      appendMsg('assistant', reply);
      firstMessage = false;

      // Mostrar badge si el panel está cerrado
      if (!chatOpen) {
        badge.style.display = 'flex';
        badge.textContent   = '1';
      }

    } catch (err) {
      removeTyping(typingId);
      appendMsg('assistant', `⚠️ Error al conectar con el asistente: ${err.message}\n\nVerifica que el Worker esté activo y el código de acceso sea válido.`);
    }

    setLoading(false);
  }
  // ── HELPERS DE UI ────────────────────────────────────────────────
  function appendMsg(role, text) {
    const now   = new Date().toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});
    const msgEl = document.createElement('div');
    msgEl.className = `chat-msg ${role}`;
    msgEl.innerHTML = `
      <div class="chat-bubble">${markdownToHtml(text)}</div>
      <div class="chat-msg-time">${now}</div>`;
    messagesEl.appendChild(msgEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const id  = 'typing-' + Date.now();
    const el  = document.createElement('div');
    el.id     = id;
    el.className = 'chat-msg assistant';
    el.innerHTML = `<div class="chat-typing"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function setLoading(val) {
    isLoading         = val;
    sendBtn.disabled  = val;
    inputEl.disabled  = val;
  }

  // Markdown mínimo → HTML
  function markdownToHtml(text) {
    return text
      // escape HTML
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      // **bold**
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      // *italic*
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      // listas
      .replace(/^[•\-\*]\s+(.+)$/gm,'<li>$1</li>')
      .replace(/^(\d+)\.\s+(.+)$/gm,'<li>$1. $2</li>')
      // wrap listas
      .replace(/(<li>[\s\S]+?<\/li>)(?=\s*<li>|$)/g, (m) => `<ul>${m}</ul>`)
      // párrafos (doble salto)
      .replace(/\n\n/g,'</p><p>')
      // salto simple
      .replace(/\n/g,'<br>')
      // wrap en párrafo
      .replace(/^(.+)$/,'<p>$1</p>');
  }

})();
</script>

</body>
</html>
