<!-- ══════════════════════════════════════════
     1. ESTILOS DEL CHAT
     Pegar dentro del <style> existente
════════════════════════════════════════════ -->
<style id="chat-styles-insert">

/* ── Chat launcher button ─────────────────────────── */
#chat-launcher {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 9000;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--teal);
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(29,106,106,.45);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .2s, box-shadow .2s;
}
#chat-launcher:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 28px rgba(29,106,106,.55);
}
#chat-launcher svg { width: 24px; height: 24px; }

/* badge contador mensajes no leídos */
#chat-badge {
  position: absolute;
  top: -4px; right: -4px;
  background: var(--warm);
  color: white;
  font-size: .62rem;
  font-weight: 700;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  border: 2px solid white;
}

/* ── Chat panel ───────────────────────────────────── */
#chat-panel {
  position: fixed;
  bottom: 90px;
  right: 28px;
  z-index: 8999;
  width: 380px;
  max-height: 560px;
  background: var(--white);
  border: 1px solid var(--border-solid);
  border-radius: 16px;
  box-shadow: 0 12px 48px rgba(46,46,56,.18), 0 2px 8px rgba(46,46,56,.08);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform-origin: bottom right;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), opacity .18s ease;
}
#chat-panel.chat-hidden {
  transform: scale(.88) translateY(12px);
  opacity: 0;
  pointer-events: none;
}

/* header del panel */
.chat-header {
  background: var(--deep-ink);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.chat-header-icon {
  width: 32px; height: 32px;
  background: var(--teal);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.chat-header-icon svg { width: 16px; }
.chat-header-text { flex: 1; }
.chat-header-title {
  font-size: .83rem;
  font-weight: 700;
  color: var(--text-on-dark);
  line-height: 1.2;
}
.chat-header-sub {
  font-size: .68rem;
  color: rgba(247,249,249,.5);
}
.chat-close-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: rgba(247,249,249,.5);
  padding: 4px;
  border-radius: 4px;
  line-height: 0;
  transition: color .15s;
}
.chat-close-btn:hover { color: var(--text-on-dark); }

/* sugerencias rápidas */
.chat-suggestions {
  padding: 10px 12px 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border-solid);
}
.chat-suggestion-btn {
  padding: 4px 10px;
  border: 1.5px solid var(--border-solid);
  border-radius: 100px;
  background: var(--mist);
  font-family: 'Urbanist', sans-serif;
  font-size: .72rem;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
  text-align: left;
}
.chat-suggestion-btn:hover {
  border-color: var(--teal);
  color: var(--teal);
  background: var(--teal-light);
}

/* mensajes */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border-solid); border-radius: 4px; }

.chat-msg {
  display: flex;
  flex-direction: column;
  max-width: 88%;
  animation: chatMsgIn .2s ease both;
}
@keyframes chatMsgIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:none; }
}
.chat-msg.user { align-self: flex-end; align-items: flex-end; }
.chat-msg.assistant { align-self: flex-start; align-items: flex-start; }

.chat-bubble {
  padding: 9px 12px;
  border-radius: 12px;
  font-size: .82rem;
  line-height: 1.55;
  word-break: break-word;
}
.chat-msg.user .chat-bubble {
  background: var(--teal);
  color: white;
  border-bottom-right-radius: 4px;
}
.chat-msg.assistant .chat-bubble {
  background: var(--mist);
  border: 1px solid var(--border-solid);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
}
/* formato markdown básico en respuestas */
.chat-bubble strong { font-weight: 700; }
.chat-bubble em     { font-style: italic; }
.chat-bubble ul, .chat-bubble ol {
  margin: 6px 0 2px 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.chat-bubble li { font-size: .81rem; }
.chat-bubble p  { margin-bottom: 6px; }
.chat-bubble p:last-child { margin-bottom: 0; }

.chat-msg-time {
  font-size: .62rem;
  color: var(--text-muted);
  margin-top: 3px;
  padding: 0 4px;
}

/* typing indicator */
.chat-typing {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 10px 12px;
  background: var(--mist);
  border: 1px solid var(--border-solid);
  border-radius: 12px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}
.chat-typing span {
  width: 6px; height: 6px;
  background: var(--teal);
  border-radius: 50%;
  opacity: .4;
  animation: typingDot 1.2s infinite;
}
.chat-typing span:nth-child(2) { animation-delay: .2s; }
.chat-typing span:nth-child(3) { animation-delay: .4s; }
@keyframes typingDot {
  0%, 80%, 100% { opacity:.4; transform:scale(1); }
  40%           { opacity:1;  transform:scale(1.3); }
}

/* input area */
.chat-input-area {
  padding: 10px 12px;
  border-top: 1px solid var(--border-solid);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--white);
  flex-shrink: 0;
}
#chat-input {
  flex: 1;
  border: 1.5px solid var(--border-solid);
  border-radius: 10px;
  padding: 8px 12px;
  font-family: 'Urbanist', sans-serif;
  font-size: .82rem;
  color: var(--text-primary);
  background: var(--mist);
  resize: none;
  min-height: 38px;
  max-height: 100px;
  outline: none;
  transition: border-color .15s;
  line-height: 1.4;
}
#chat-input:focus { border-color: var(--teal); background: white; }
#chat-input::placeholder { color: var(--text-muted); }

#chat-send-btn {
  width: 36px; height: 36px;
  border-radius: 9px;
  background: var(--teal);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .15s, transform .1s;
}
#chat-send-btn:hover { background: var(--teal-mid); }
#chat-send-btn:active { transform: scale(.94); }
#chat-send-btn:disabled { background: var(--border-solid); cursor: not-allowed; }
#chat-send-btn svg { width: 16px; }

/* disclaimer footer */
.chat-disclaimer {
  padding: 6px 12px 8px;
  font-size: .64rem;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.4;
  border-top: 1px solid var(--border-solid);
  background: #fafbfb;
}

/* responsive */
@media (max-width: 480px) {
  #chat-panel { width: calc(100vw - 24px); right: 12px; bottom: 80px; }
  #chat-launcher { right: 16px; bottom: 16px; }
}
</style>

<!-- ══════════════════════════════════════════
     3. JAVASCRIPT DEL CHAT
     Pegar justo antes del cierre del </script>
     existente, o en un nuevo <script> al final
════════════════════════════════════════════ -->
<script id="chat-script-insert">
(function() {
  // ── CONFIG ───────────────────────────────────────────────────────
  // Reemplazar con tu URL real de Cloudflare Worker tras el deploy
  const WORKER_URL = 'https://mw-consulting-chat.TU_SUBDOMINIO.workers.dev';

  // ── ESTADO ───────────────────────────────────────────────────────
  let chatOpen      = false;
  let isLoading     = false;
  let estudioData   = null;  // se llena cuando DATA esté disponible
  let chatHistory   = [];    // [{role, content}]
  let firstMessage  = true;

  // ── ELEMENTOS ────────────────────────────────────────────────────
  const launcher    = document.getElementById('chat-launcher');
  const panel       = document.getElementById('chat-panel');
  const closeBtn    = document.getElementById('chat-close-btn');
  const messagesEl  = document.getElementById('chat-messages');
  const inputEl     = document.getElementById('chat-input');
  const sendBtn     = document.getElementById('chat-send-btn');
  const badge       = document.getElementById('chat-badge');
  const headerSub   = document.getElementById('chat-header-sub');
  const suggestions = document.querySelectorAll('.chat-suggestion-btn');

  // ── CONECTAR CON DATA del viewer ──────────────────────────────────
  // El viewer define DATA una vez que carga el JSON. Esperamos a que esté.
  function tryConnectData() {
    if (typeof DATA !== 'undefined' && DATA !== null) {
      estudioData = DATA;
      headerSub.textContent = DATA.meta?.proyecto || 'Estudio cargado';
    } else {
      setTimeout(tryConnectData, 300);
    }
  }
  tryConnectData();

  // ── TOGGLE PANEL ─────────────────────────────────────────────────
  function openChat() {
    chatOpen = true;
    panel.classList.remove('chat-hidden');
    launcher.setAttribute('aria-expanded', 'true');
    badge.style.display = 'none';
    badge.textContent   = '';
    // Mensaje de bienvenida solo la primera vez
    if (chatHistory.length === 0) showWelcome();
    setTimeout(() => inputEl.focus(), 120);
  }

  function closeChat() {
    chatOpen = false;
    panel.classList.add('chat-hidden');
    launcher.setAttribute('aria-expanded', 'false');
  }

  launcher.addEventListener('click', () => chatOpen ? closeChat() : openChat());
  closeBtn.addEventListener('click', closeChat);

  // cerrar con Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && chatOpen) closeChat();
  });

  // ── BIENVENIDA ───────────────────────────────────────────────────
  function showWelcome() {
    const nombre = estudioData?.meta?.proyecto || 'este estudio';
    appendMsg('assistant',
      `👋 Hola, soy el asistente IA de MW Consulting.\n\nPuedo responderte preguntas sobre **${nombre}**: precios, competencia, tipologías, zonas y más.\n\n¿En qué te ayudo?`
    );
  }

  // ── SUGERENCIAS ───────────────────────────────────────────────────
  suggestions.forEach(btn => {
    btn.addEventListener('click', () => {
      const q = btn.dataset.q;
      if (q && !isLoading) {
        inputEl.value = q;
        sendMessage();
      }
    });
  });

  // ── ENVIAR ───────────────────────────────────────────────────────
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  // auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    if (!estudioData) {
      appendMsg('assistant', '⏳ El estudio aún está cargando, espera un momento…');
      return;
    }

    // Mostrar msg del usuario
    appendMsg('user', text);
    chatHistory.push({ role: 'user', content: text });
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setLoading(true);

    // Typing indicator
    const typingId = showTyping();

    try {
      const res = await fetch(WORKER_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          codigo:      (new URLSearchParams(location.search)).get('codigo') || '',
          messages:    chatHistory,
          estudioJson: estudioData,
        }),
      });

      removeTyping(typingId);

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `Error ${res.status}`);
      }

      const data     = await res.json();
      const reply    = data.response || 'Sin respuesta.';

      chatHistory.push({ role: 'assistant', content: reply });
      appendMsg('assistant', reply);
      firstMessage = false;

      // Mostrar badge si el panel está cerrado
      if (!chatOpen) {
        badge.style.display = 'flex';
        badge.textContent   = '1';
      }

    } catch (err) {
      removeTyping(typingId);
      appendMsg('assistant', `⚠️ Error al conectar con el asistente: ${err.message}\n\nVerifica que el Worker esté activo y el código de acceso sea válido.`);
    }

    setLoading(false);
  }

  // ── HELPERS DE UI ────────────────────────────────────────────────
  function appendMsg(role, text) {
    const now   = new Date().toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});
    const msgEl = document.createElement('div');
    msgEl.className = `chat-msg ${role}`;
    msgEl.innerHTML = `
      <div class="chat-bubble">${markdownToHtml(text)}</div>
      <div class="chat-msg-time">${now}</div>`;
    messagesEl.appendChild(msgEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const id  = 'typing-' + Date.now();
    const el  = document.createElement('div');
    el.id     = id;
    el.className = 'chat-msg assistant';
    el.innerHTML = `<div class="chat-typing"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function setLoading(val) {
    isLoading         = val;
    sendBtn.disabled  = val;
    inputEl.disabled  = val;
  }

  // Markdown mínimo → HTML
  function markdownToHtml(text) {
    return text
      // escape HTML
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      // **bold**
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      // *italic*
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      // listas
      .replace(/^[•\-\*]\s+(.+)$/gm,'<li>$1</li>')
      .replace(/^(\d+)\.\s+(.+)$/gm,'<li>$1. $2</li>')
      // wrap listas
      .replace(/(<li>[\s\S]+?<\/li>)(?=\s*<li>|$)/g, (m) => `<ul>${m}</ul>`)
      // párrafos (doble salto)
      .replace(/\n\n/g,'</p><p>')
      // salto simple
      .replace(/\n/g,'<br>')
      // wrap en párrafo
      .replace(/^(.+)$/,'<p>$1</p>');
  }

})();
</script>
